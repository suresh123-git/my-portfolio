<header class="header">
  <div class="container">
    <nav class="nav">
      <a routerLink="/" class="logo">
        <span class="logo-text">Suresh Lingala</span>
      </a>

      <button
        class="mobile-menu-btn"
        [class.active]="isMenuOpen"
        (click)="toggleMenu()"
        [attr.aria-expanded]="isMenuOpen"
        aria-label="Toggle navigation menu">
        <span class="hamburger"></span>
        <span class="hamburger"></span>
        <span class="hamburger"></span>
      </button>

      <ul class="nav-links" [class.active]="isMenuOpen">
        <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="closeMenu()">Home</a></li>
        <li><a routerLink="/about" routerLinkActive="active" (click)="closeMenu()">About</a></li>
        <li><a routerLink="/projects" routerLinkActive="active" (click)="closeMenu()">Projects</a></li>
        <li><a routerLink="/blog" routerLinkActive="active" (click)="closeMenu()">Blog</a></li>
        <li><a routerLink="/contact" routerLinkActive="active" (click)="closeMenu()">Contact</a></li>
        <li class="resume-link-item">
          <a
            class="resume-link"
            [href]="resumeUrl"
            [attr.download]="resumeFileName"
            (click)="closeMenu()"
            aria-label="Download resume">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M12 3a1 1 0 0 1 1 1v8.59l2.3-2.29a1 1 0 1 1 1.4 1.41l-4 4a1 1 0 0 1-1.4 0l-4-4a1 1 0 1 1 1.4-1.41L11 12.59V4a1 1 0 0 1 1-1Z"/>
              <path d="M5 19a1 1 0 0 1 1-1h12a1 1 0 1 1 0 2H6a1 1 0 0 1-1-1Z"/>
            </svg>
            <span>Resume</span>
          </a>
        </li>
      </ul>

    </nav>
  </div>
</header>
